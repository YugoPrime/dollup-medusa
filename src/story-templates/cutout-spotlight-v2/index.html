<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div class="bg-circle" aria-hidden="true"></div>
      <div class="bg-dot bg-dot-1" aria-hidden="true"></div>
      <div class="bg-dot bg-dot-2" aria-hidden="true"></div>
      <div class="bg-dot bg-dot-3" aria-hidden="true"></div>

      <div class="scene">
        <span class="kicker" data-hf-text="kicker">MUST HAVE</span>
        <h1 class="headline" data-hf-text="headline">IN STOCK</h1>

        <div class="cutout-wrap">
          <img class="cutout" data-hf-image="product_cutout" alt="" />
        </div>

        <div class="info">
          <span class="price-script" data-hf-text="price">Rs.0</span>
          <div class="caps-row">
            <span class="sku" data-hf-text="sku">IS0000</span>
            <span class="dot-sep" aria-hidden="true">•</span>
            <span class="size" data-hf-text="size">Size: S · M · L</span>
          </div>
          <div class="footer" data-hf-text="footer">DM TO ORDER</div>
          <a class="shop-chip" aria-label="Shop now at dollupboutique.com">
            <span class="shop-chip-label">Shop now</span>
            <span class="shop-chip-arrow" aria-hidden="true">&#8594;</span>
            <span class="shop-chip-url">DOLLUPBOUTIQUE.COM</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
