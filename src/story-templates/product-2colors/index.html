<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div class="scene">
        <h2 class="headline" data-hf-text="headline">2 COLORS AVAILABLE</h2>

        <div class="hero">
          <div class="fronts">
            <div class="panel front-a">
              <img data-hf-image="front_a" alt="" />
              <span class="card-size" data-hf-text="size_a">S · M · L</span>
            </div>
            <div class="panel front-b">
              <img data-hf-image="front_b" alt="" />
              <span class="card-size" data-hf-text="size_b">S · M · L</span>
            </div>
          </div>

          <div class="back-overlap">
            <span class="back-tag">BACK</span>
            <div class="back-panel"><img data-hf-image="back" alt="" /></div>
          </div>
        </div>

        <div class="info">
          <div class="meta">
            <span class="price" data-hf-text="price">Rs.0</span>
            <span class="sku" data-hf-text="sku">IS0000</span>
          </div>
          <div class="footer" data-hf-text="footer">DM to ORDER</div>
          <a class="shop-chip" aria-label="Shop now at dollupboutique.com">
            <span class="shop-chip-label">Shop now</span>
            <span class="shop-chip-arrow" aria-hidden="true">&#8594;</span>
            <span class="shop-chip-url">dollupboutique.com</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
