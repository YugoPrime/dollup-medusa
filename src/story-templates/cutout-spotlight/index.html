<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div class="bg-shape"></div>
      <div class="scene">
        <span class="kicker" data-hf-text="kicker">MUST HAVE</span>
        <h1 class="headline" data-hf-text="headline">IN STOCK</h1>
        <div class="cutout-wrap">
          <img class="cutout" data-hf-image="product_cutout" alt="" />
        </div>
        <div class="price-pill">
          <span class="price" data-hf-text="price">Rs.0</span>
          <span class="sku" data-hf-text="sku">IS0000</span>
        </div>
        <span class="size-pill" data-hf-text="size">Size: S, M, L</span>
        <div class="footer" data-hf-text="footer">DM to ORDER</div>
        <span class="shop-badge" role="img" aria-label="Shop dollupboutique.com"></span>
      </div>
    </div>
  </body>
</html>
