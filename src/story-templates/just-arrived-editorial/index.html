<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div class="leaf leaf-tl" aria-hidden="true"></div>
      <div class="leaf leaf-bl" aria-hidden="true"></div>
      <div class="window-light" aria-hidden="true"></div>

      <div class="scene">
        <header class="brand-head">
          <span class="brand-logo brand-logo-sm" role="img" aria-label="Doll Up Boutique"></span>
          <span class="brand-name" data-hf-text="kicker">DOLL UP BOUTIQUE</span>
          <span class="ornament" aria-hidden="true">◆</span>
        </header>

        <h1 class="headline">
          <span class="head-word word-a" data-hf-text="headline">Just Arrived</span>
        </h1>

        <div class="arch-stage">
          <div class="arch-frame"></div>
          <div class="arch-shadow" aria-hidden="true"></div>
          <img class="hero" data-hf-image="hero" alt="" />
        </div>

        <div class="meta-block">
          <div class="product-name" data-hf-text="product_name">Product Name</div>
          <span class="divider" aria-hidden="true"></span>
          <div class="tagline" data-hf-text="tagline">Soft fit. Easy to style.</div>
          <div class="price" data-hf-text="price">Rs.0</div>
          <div class="size" data-hf-text="size">Available · S M L XL</div>
        </div>

        <div class="cta">
          <span class="cta-text" data-hf-text="cta">Shop the look</span>
          <span class="arrow" aria-hidden="true">→</span>
        </div>
        <div class="footer-url" data-hf-text="footer_url">dollupboutique.com</div>
      </div>
    </div>
  </body>
</html>
