<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="7" data-width="1080" data-height="1920">
      <div class="bg-curve" aria-hidden="true"></div>
      <div class="leaf-l" aria-hidden="true"></div>
      <div class="hearts h1" aria-hidden="true">♡</div>
      <div class="hearts h2" aria-hidden="true">♡</div>
      <div class="hearts h3" aria-hidden="true">✦</div>

      <div class="scene">
        <header class="brand-head">
          <span class="brand-logo brand-logo-sm" role="img" aria-label="Doll Up Boutique"></span>
        </header>

        <h1 class="headline">
          <span class="line-a" data-hf-text="headline_a">Same style,</span>
          <span class="line-b" data-hf-text="headline_b">different mood</span>
          <span class="underline" aria-hidden="true"></span>
          <span class="heart-deco" aria-hidden="true">♡</span>
        </h1>

        <div class="grid">
          <div class="hero-col">
            <div class="hero-arch">
              <img class="hero" data-hf-image="hero" alt="" />
              <span class="fav" aria-hidden="true">
                <span class="fav-spark">✦</span>
                <span class="fav-heart">♡</span>
              </span>
            </div>
            <div class="product-name" data-hf-text="product_name">Product Name</div>
            <span class="name-dot" aria-hidden="true">♥</span>
            <div class="price" data-hf-text="price">Rs.0</div>
          </div>

          <aside class="rail">
            <div class="rail-title">
              <span data-hf-text="available_label">Available in</span>
              <span class="rail-underline" aria-hidden="true"></span>
            </div>
            <div class="thumb">
              <div class="thumb-arch"><img data-hf-image="color_a" alt="" /></div>
              <div class="thumb-heart" aria-hidden="true">♡</div>
              <div class="thumb-label" data-hf-text="color_a_label">Cream</div>
              <div class="thumb-size" data-hf-text="size_a">S · M · L</div>
            </div>
            <div class="thumb">
              <div class="thumb-arch"><img data-hf-image="color_b" alt="" /></div>
              <div class="thumb-heart" aria-hidden="true">♡</div>
              <div class="thumb-label" data-hf-text="color_b_label">Sage</div>
              <div class="thumb-size" data-hf-text="size_b">S · M · L</div>
            </div>
            <div class="thumb">
              <div class="thumb-arch"><img data-hf-image="color_c" alt="" /></div>
              <div class="thumb-heart" aria-hidden="true">♡</div>
              <div class="thumb-label" data-hf-text="color_c_label">Black</div>
              <div class="thumb-size" data-hf-text="size_c">S · M · L</div>
            </div>
          </aside>
        </div>

        <div class="cta" data-hf-text="cta">Choose your color <span class="cta-heart" aria-hidden="true">♥</span></div>
        <div class="footer-line">
          <span class="dot">✦</span>
          <span class="footer-url" data-hf-text="footer_url">dollupboutique.com</span>
          <span class="dot">✦</span>
        </div>
      </div>
    </div>
  </body>
</html>
