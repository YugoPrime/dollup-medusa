<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="7" data-width="1080" data-height="1920">
      <div class="silk silk-tl"></div>
      <div class="silk silk-br"></div>
      <div class="pampas pampas-tr"></div>
      <div class="pampas pampas-bl"></div>

      <div class="scene">
        <span class="brand-logo brand-logo-sm header-logo" role="img" aria-label="Doll Up Boutique"></span>
        <span class="kicker" data-hf-text="kicker">NEW DROP</span>

        <div class="arch-wrap">
          <div class="arch">
            <img class="front" data-hf-image="front" alt="" />
          </div>
          <div class="back-bubble">
            <span class="back-tag">BACK VIEW</span>
            <img class="back" data-hf-image="back" alt="" />
          </div>
          <span class="back-arrow" aria-hidden="true">↘</span>
        </div>

        <h1 class="headline" data-hf-text="headline">Product Name</h1>
        <span class="divider" aria-hidden="true"></span>
        <div class="price" data-hf-text="price">Rs.0</div>
        <span class="size-pill" data-hf-text="size">Sizes: S · M · L</span>

        <div class="cta">
          <span class="bag" aria-hidden="true"></span>
          <span class="cta-text" data-hf-text="cta">TAP TO SHOP</span>
          <span class="spark" aria-hidden="true">✦</span>
        </div>
        <div class="footer-url" data-hf-text="footer_url">dollupboutique.com</div>
      </div>
    </div>
  </body>
</html>
