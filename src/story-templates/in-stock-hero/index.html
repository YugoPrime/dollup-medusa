<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div class="scene">
        <span class="subhead" data-hf-text="subhead">MUST HAVE</span>
        <h1 class="headline" data-hf-text="headline">IN STOCK</h1>
        <div class="hero-frame">
          <img class="hero" data-hf-image="hero" alt="" />
          <div class="size-pill" data-hf-text="size">Size: S, M, L</div>
          <div class="price-pill">
            <span class="price" data-hf-text="price">Rs.0</span>
            <span class="sku" data-hf-text="sku">IS0000</span>
          </div>
        </div>
        <div class="footer" data-hf-text="footer">DM to ORDER</div>
        <span class="shop-badge" role="img" aria-label="Shop dollupboutique.com"></span>
      </div>
    </div>
  </body>
</html>
