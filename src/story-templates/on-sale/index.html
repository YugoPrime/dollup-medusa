<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="../_brand/tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root" class="canvas" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div class="scene">
        <div class="stamp-wrap">
          <span class="stamp">SALE</span>
          <span class="discount-pct" data-hf-text="discount_pct"></span>
        </div>

        <div class="hero-wrap"><img class="hero" data-hf-image="hero" alt="" /></div>

        <div class="info">
          <div class="prices">
            <span class="old" data-hf-text="old_price">Rs.0</span>
            <span class="new" data-hf-text="new_price">Rs.0</span>
          </div>
          <div class="sku" data-hf-text="sku">IS0000</div>
          <span class="size-pill" data-hf-text="size">Size: S · M · L</span>
          <div class="footer" data-hf-text="footer">DM to ORDER</div>
          <a class="shop-chip" aria-label="Shop now at dollupboutique.com">
            <span class="shop-chip-label">Shop now</span>
            <span class="shop-chip-arrow" aria-hidden="true">&#8594;</span>
            <span class="shop-chip-url">dollupboutique.com</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
