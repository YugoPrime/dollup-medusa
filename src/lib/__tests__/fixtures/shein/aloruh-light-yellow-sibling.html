nstallation must comply with EU Regulation No. 517/2014 and Royal Decree 115/2017. These laws cover the sale and handling of F-gases and equipment, certification of professionals, and facility technical requirements for activities involving F-gas emissions.","SHEIN_KEY_PC_37762":"Charger","SHEIN_KEY_PC_38057":"Turkey Responsible Person for This Product","SHEIN_KEY_PC_38058":"The Responsible Person is the Turkey based economic operator for certain compliance obligations for the product.","SHEIN_KEY_PC_38183":"This product contains batteries（Recycling Batteries）","SHEIN_KEY_PC_38184":"Recylcling batteries details​​​","SHEIN_KEY_PC_38185":"1. Why recycling batteries matter?","SHEIN_KEY_PC_38186":"Batteries are ubiquitous in our daily lives. They are made from important resources, including zinc, iron, manganese, nickel, cadmium and lead. Some of these substances, such as mercury, lead and cadmium, are also very dangerous for the environment and human health. If used batteries are disposed of in unsorted municipal household waste, they will be taken to a landfill site and those resources will be lost and will contribute to the pollution of the environment or pose a risk to human health.","SHEIN_KEY_PC_38187":"By taking used batteries to a take-back point for recycling, we save primary raw material resources and at the same time protect our environment from possible improper disposal. Used batteries that are not handed over for recycling through take-back points, but are stored, for example, in office drawers or elsewhere in households or companies, can cause fires. It is therefore very important to recycle used batteries as soon as possible.","SHEIN_KEY_PC_38188":"You must dispose of used batteries separately from other waste, using the collection and recycling schemes available. All batteries are labelled with the crossed-out wheeled bin below, to indicate that they shouldn't be disposed of as normal waste, but in specific recycling centres. Batteries containing hazardous substances such as mercury (Hg), cadmium (Cd) or lead (Pb) are also marked with their chemical symbol.","SHEIN_KEY_PC_38189":"2. What should you do with your used batteries?","SHEIN_KEY_PC_25169":"{0} off","SHEIN_KEY_PC_31969":"Navigation","SHEIN_KEY_PC_34725":"Loading...","SHEIN_KEY_PC_36128":"Close","SHEIN_KEY_PC_17892":"Select address","SHEIN_KEY_PC_35550":"Price","SHEIN_KEY_PC_34053":"Add to Cart","SHEIN_KEY_PC_34767":"Retail Price:","SHEIN_KEY_PC_19753":"Product Details","SHEIN_KEY_PC_35169":"Description","SHEIN_KEY_PC_36342":"​Energy Efficiency","SHEIN_KEY_PC_36333":"​Product Sheet"},"enableStructuredData":true,"bsLibsEnvs":{"lang":"en","langPath":"","currency":"USD","csrf_token":"nkXiu0r6-dqvBjLfyAHabILLtWRBt9_BFRTE","SiteUID":"www","appLanguage":"en","GB_cssRight":false,"SERVER_TYPE":"central","NODE_SERVER_ENV":"production","host":"https://www.shein.com","RESOURCE_SDK":{"isSupportWeb":1,"deviceData":"","isSupprotCut":true,"isSupportCropImage":true,"isSupportAvif":0,"isAvifGated":false},"ENABLE_MIDDLE_EAST_FONT":1,"isLogin":false,"memberId":"","forceHttp":"https://www.shein.com","cccNav":{"isNewCartEntrance":false,"isRobotServiceOpen":true,"isTopHeaderNavigatorUp":false,"isNewFloatUp":true,"topHasPolicyCcc":false,"topBannerContent":[],"topBannerTraceId":"97259e77a168576c:52961a30dc9c919:77a4ef5821330fd9:0","activeChannelId":10,"enlargeSearch":true,"isSearchPage":false,"originalUrl":"/Aloruh-Women-s-Solid-Color-Casual-Halter-Mini-Bubble-Dress-p-373210897.html","en":[{"id":"recommend","firstFloorContent":{"props":{"metaData":{"categoryType":{"hrefTarget":"1780","hrefType":"real","trackHrefType":"real","trackHrefTarget":"1780","clickUrl":"/goods/real_goods_list?data=%7B%22channel_name%22%3A%22Just%20for%20You%22%2C%22top_goods_id%22%3A%22401805415%22%2C%22entranceType%22%3Anull%2C%22mall_code_list%22%3Anull%2C%22aod_id%22%3A%22%22%2C%22cat_id%22%3A%221780%22%2C%22title%22%3A%22Women%20Two-piece%20Outfits%22%7D","webClickUrl":"/Women-Two-piece-Outfits-c-1780.
